# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # @actions/core and @actions/github v3+ are ESM-only and break ncc CJS bundles.
    # Pin to majors only when v4+ or a CJS-friendly release ships.
    # Same pattern as austenstone/activity. See austenstone-notes LESSONS_LEARNED.md.
    ignore:
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/github"
        update-types: ["version-update:semver-major"]
